<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyra | Your Cute AI Companion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="cyber-kawaii">
    <div class="stars"></div>
    <div class="glow-bg"></div>
    
    <div class="dashboard-wrapper">
        <!-- Header -->
        <header class="top-nav">
            <div class="logo">CYRA<span>.ai</span></div>
            <div class="system-status">
                <div class="status-pulse listening" id="pulse-indicator"></div>
                <span id="cyra-status">Online & Listening~</span>
            </div>
        </header>

        <main class="content-grid">
            <!-- Chat Column -->
            <div class="glass-panel chat-section">
                <div class="panel-header">
                    <i class="icon-chat"></i> <span>Recent Chats</span>
                </div>
                <div id="chat-log" class="chat-bubbles">
                    <div class="bubble cyra">Hehe, Cyra is ready to help you, Dheeraj! ✨</div>
                </div>
                <div id="subtitle-box" class="subtitle-overlay">
                    <p id="current-text"></p>
                </div>
            </div>

            <!-- Avatar Column -->
            <div class="avatar-section">
                <div class="avatar-glow"></div>
                <img src="/static/cyra_char.png" alt="Cyra" class="cyra-png floating">
            </div>

            <!-- Stats Column -->
            <div class="stats-column">
                <div class="glass-panel stats-card">
                    <div class="panel-header">Energy Levels</div>
                    
                    <div class="progress-item">
                        <div class="label-row">
                            <span>Brain (Groq)</span>
                            <span id="groq-val">0%</span>
                        </div>
                        <div class="bar-outer"><div id="groq-bar" class="bar-inner purple"></div></div>
                    </div>

                    <div class="progress-item">
                        <div class="label-row">
                            <span>Voice (Eleven)</span>
                            <span id="eleven-val">0%</span>
                        </div>
                        <div class="bar-outer"><div id="eleven-bar" class="bar-inner pink"></div></div>
                    </div>
                </div>

                <div class="mini-stats">
                    <div class="glass-panel mini-card">
                        <span class="mini-label">Vision</span>
                        <span class="mini-value" id="vision-val">0</span>
                    </div>
                    <div class="glass-panel mini-card">
                        <span class="mini-label">Talks</span>
                        <span class="mini-value" id="stt-val">0</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
